<div id="assistantBtn" style="position:fixed; bottom:24px; right:24px; width:56px; height:56px; border-radius:50%; background:var(--color-primary); color:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 4px 16px rgba(0,0,0,0.25); z-index:900; font-size:24px;" onclick="toggleAssistant()">💬</div>

<div id="assistantPanel" style="display:none; position:fixed; bottom:90px; right:24px; width:360px; max-width:90vw; height:480px; max-height:70vh; background:var(--color-surface); border:1px solid var(--color-border); border-radius:var(--radius); box-shadow:0 8px 32px rgba(0,0,0,0.25); z-index:900; flex-direction:column; overflow:hidden;">
  <div style="background:var(--color-primary); color:#fff; padding:14px 16px; font-family:'Space Grotesk',sans-serif; font-weight:600; display:flex; justify-content:space-between; align-items:center;">
    <span>Ask StockFlow <span style="color:var(--color-accent);">AI</span></span>
    <span style="cursor:pointer; font-size:18px;" onclick="toggleAssistant()">&times;</span>
  </div>
  <div id="assistantMessages" style="flex:1; overflow-y:auto; padding:14px; font-size:14px; display:flex; flex-direction:column; gap:10px;">
    <div style="color:var(--color-text-muted); font-size:13px;">Ask about revenue, pending payments, low stock, top customers — anything from your live data.</div>
  </div>
  <div style="display:flex; border-top:1px solid var(--color-border); padding:10px;">
    <input type="text" id="assistantInput" placeholder="e.g. Who owes me the most?" style="flex:1; margin:0; border:1px solid var(--color-border); border-radius:6px; padding:8px 10px; font-size:14px;">
    <button onclick="sendAssistantQuestion()" style="margin-left:8px; padding:8px 14px;">Ask</button>
  </div>
</div>

<script>
function toggleAssistant() {
  const panel = document.getElementById("assistantPanel");
  panel.style.display = panel.style.display === "none" ? "flex" : "none";
  if (panel.style.display === "flex") document.getElementById("assistantInput").focus();
}

function appendAssistantMessage(text, fromUser) {
  const box = document.getElementById("assistantMessages");
  const bubble = document.createElement("div");
  bubble.style.cssText = fromUser
    ? "align-self:flex-end; background:var(--color-primary); color:#fff; padding:8px 12px; border-radius:10px 10px 2px 10px; max-width:85%;"
    : "align-self:flex-start; background:var(--color-bg); border:1px solid var(--color-border); padding:8px 12px; border-radius:10px 10px 10px 2px; max-width:85%;";
  bubble.textContent = text;
  box.appendChild(bubble);
  box.scrollTop = box.scrollHeight;
}

async function sendAssistantQuestion() {
  const input = document.getElementById("assistantInput");
  const question = input.value.trim();
  if (!question) return;

  appendAssistantMessage(question, true);
  input.value = "";

  const thinking = document.createElement("div");
  thinking.id = "assistantThinking";
  thinking.style.cssText = "align-self:flex-start; color:var(--color-text-muted); font-size:13px; padding:4px 12px;";
  thinking.textContent = "Thinking…";
  document.getElementById("assistantMessages").appendChild(thinking);

  try {
    const res = await fetch("/api/assistant/ask", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ question }),
    });
    const data = await res.json();
    document.getElementById("assistantThinking")?.remove();

    if (!res.ok) {
      appendAssistantMessage(data.error || "Something went wrong.", false);
      return;
    }
    appendAssistantMessage(data.answer, false);
  } catch (err) {
    document.getElementById("assistantThinking")?.remove();
    appendAssistantMessage("Connection error. Try again.", false);
  }
}

document.getElementById("assistantInput").addEventListener("keydown", (e) => {
  if (e.key === "Enter") sendAssistantQuestion();
});
</script>

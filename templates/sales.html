<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockFlow - Sales</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="{{ url_for('static', filename='modal.js') }}"></script>
</head>
<body>

{% include "_nav.html" %}

<div class="page">
  <div class="eyebrow">Siddarth Traders</div>
  <h1>Record Sale</h1>

  <div class="layout">
    <form id="saleForm" class="card">
      <select id="customer_id" required><option value="">Select Customer</option></select>
      <select id="item_id" required><option value="">Select Item</option></select>
      <input type="number" id="qty" placeholder="Quantity" min="1" required>
      <div class="hint" id="totalPreview"></div>
      <input type="number" id="amount_paid" placeholder="Amount Paid Now" step="0.01" min="0">
      <div class="hint">Leave blank or 0 for fully unpaid. Full total = fully paid.</div>
      <button type="submit">Record Sale</button>
    </form>
  </div>

  <h2>Transaction History</h2>
  <table>
    <thead>
      <tr><th>Date</th><th>Customer</th><th>Item</th><th>Qty</th><th>Total</th><th>Paid</th><th>Pending</th><th>Profit</th><th>Actions</th></tr>
    </thead>
    <tbody id="txnTable"></tbody>
  </table>
</div>

<script>
let itemsCache = [];

async function loadDropdowns() {
  const [customers, items] = await Promise.all([
    fetch("/api/customers").then(r => r.json()),
    fetch("/api/items").then(r => r.json()),
  ]);
  customers.sort((a, b) => a.name.localeCompare(b.name));
  items.sort((a, b) => a.name.localeCompare(b.name));
  itemsCache = items;

  const custSelect = document.getElementById("customer_id");
  custSelect.innerHTML = '<option value="">Select Customer</option>';
  customers.forEach(c => {
    custSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
  });

  const itemSelect = document.getElementById("item_id");
  itemSelect.innerHTML = '<option value="">Select Item</option>';
  items.forEach(i => {
    itemSelect.innerHTML += `<option value="${i.id}">${i.name} (stock: ${i.current_stock})</option>`;
  });
}

function updateTotalPreview() {
  const itemId = parseInt(document.getElementById("item_id").value);
  const qty = parseInt(document.getElementById("qty").value) || 0;
  const item = itemsCache.find(i => i.id === itemId);
  const preview = document.getElementById("totalPreview");
  if (item && qty) {
    const total = (item.sale_price * qty).toFixed(2);
    preview.textContent = `Total: ₹${total}`;
    document.getElementById("amount_paid").value = total;
  } else {
    preview.textContent = "";
  }
}

document.getElementById("item_id").addEventListener("change", updateTotalPreview);
document.getElementById("qty").addEventListener("input", updateTotalPreview);

async function loadTransactions() {
  const res = await fetch("/api/transactions");
  const txns = await res.json();
  const tbody = document.getElementById("txnTable");
  tbody.innerHTML = "";
  txns.forEach(t => {
    tbody.innerHTML += `
      <tr>
        <td>${t.date}</td>
        <td>${t.customer}</td>
        <td>${t.item}</td>
        <td>${t.qty}</td>
        <td>₹${t.total}</td>
        <td>₹${t.amount_paid}</td>
        <td style="color:${t.pending > 0 ? '#B3462C' : '#3F6B4C'}; font-weight:600;">₹${t.pending}</td>
        <td class="profit">₹${t.profit}</td>
        <td><button class="delete-btn" onclick="deleteTxn(${t.id})">Undo</button></td>
      </tr>`;
  });
}

async function deleteTxn(id) {
  const ok = await sfConfirm("Undo this sale? Stock will be restored.");
  if (!ok) return;
  await fetch(`/api/transactions/${id}`, { method: "DELETE" });
  loadTransactions();
  location.reload();
}

document.getElementById("saleForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const payload = {
    customer_id: parseInt(document.getElementById("customer_id").value),
    item_id: parseInt(document.getElementById("item_id").value),
    qty: parseInt(document.getElementById("qty").value),
    amount_paid: parseFloat(document.getElementById("amount_paid").value) || 0,
  };

  const res = await fetch("/api/transactions", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(payload),
  });

  if (!res.ok) {
    const err = await res.json();
    await sfAlert(err.error);
    return;
  }

  document.getElementById("saleForm").reset();
  document.getElementById("totalPreview").textContent = "";
  loadTransactions();
  loadDropdowns();
});

loadDropdowns();
loadTransactions();
</script>

</body>
</html>

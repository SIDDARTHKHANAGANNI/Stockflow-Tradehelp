<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockFlow - Items</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="{{ url_for('static', filename='modal.js') }}"></script>
</head>
<body>

{% include "_nav.html" %}
{% include "_assistant.html" %}

<div class="page">
  <div class="eyebrow">Siddarth Traders</div>
  <h1>Items / Stock</h1>

  <button class="btn-accent" onclick="openLowStockModal()" style="margin-bottom:24px;">Send Low Stock Alerts</button>

  <div id="lowStockModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; align-items:center; justify-content:center;">
    <div class="card" style="max-width:500px; width:90%; max-height:80vh; overflow-y:auto;">
      <h2 style="margin-top:0;">Select Items to Alert Supplier</h2>
      <div id="lowStockList"></div>
      <div style="display:flex; gap:10px; margin-top:16px;">
        <button class="btn-accent" onclick="confirmSendAlerts()">Send Selected</button>
        <button class="delete-btn" onclick="closeLowStockModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="layout">
    <form id="itemForm" class="card form-grid">
      <input type="hidden" id="itemId">
      <input type="text" id="name" placeholder="Item Name" class="full-width" required>
      <input type="number" id="cost_price" placeholder="Cost Price" step="0.01" required>
      <input type="number" id="sale_price" placeholder="Sale Price" step="0.01" required>
      <input type="number" id="current_stock" placeholder="Initial Stock" value="0">
      <input type="number" id="reorder_threshold" placeholder="Reorder Threshold" value="10">
      <input type="email" id="supplier_email" placeholder="Supplier Email" class="full-width">
      <button type="submit" id="submitBtn" class="full-width">Add Item</button>
    </form>
  </div>

  <table>
    <thead>
      <tr><th>Name</th><th>Cost</th><th>Sale Price</th><th>Stock</th><th>Actions</th></tr>
    </thead>
    <tbody id="itemTable"></tbody>
  </table>
</div>

<script>
const API = "/api/items";

async function loadItems() {
  const res = await fetch(API);
  const items = await res.json();
  items.sort((a, b) => a.name.localeCompare(b.name));
  const tbody = document.getElementById("itemTable");
  tbody.innerHTML = "";
  items.forEach(i => {
    const lowStock = i.current_stock <= i.reorder_threshold;
    tbody.innerHTML += `
      <tr class="${lowStock ? 'low-stock' : ''}">
        <td>${i.name}</td>
        <td>${i.cost_price}</td>
        <td>${i.sale_price}</td>
        <td>${i.current_stock} ${lowStock ? '(LOW)' : ''}</td>
        <td>
          <button class="edit-btn" onclick='editItem(${JSON.stringify(i)})'>Edit</button>
          <button class="stock-btn" onclick="adjustStock(${i.id})">+/- Stock</button>
          <button class="delete-btn" onclick="deleteItem(${i.id})">Delete</button>
        </td>
      </tr>`;
  });
}

function editItem(i) {
  document.getElementById("itemId").value = i.id;
  document.getElementById("name").value = i.name;
  document.getElementById("cost_price").value = i.cost_price;
  document.getElementById("sale_price").value = i.sale_price;
  document.getElementById("current_stock").value = i.current_stock;
  document.getElementById("reorder_threshold").value = i.reorder_threshold;
  document.getElementById("supplier_email").value = i.supplier_email || "";
  document.getElementById("submitBtn").textContent = "Update Item";
}

async function adjustStock(id) {
  const result = await sfModal({
    title: "Adjust Stock",
    fields: [{ key: "change_qty", label: "Change (+ to add, − to deduct)", type: "number", value: 0 }],
    confirmText: "Apply",
  });
  if (result === null || !result.change_qty) return;

  const res = await fetch(`${API}/${id}/stock`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ change_qty: result.change_qty, reason: "manual" }),
  });
  if (!res.ok) {
    const err = await res.json();
    await sfAlert(err.error);
    return;
  }
  loadItems();
}

async function deleteItem(id) {
  const ok = await sfConfirm("Delete this item? Stock history will also be removed.");
  if (!ok) return;
  await fetch(`${API}/${id}`, { method: "DELETE" });
  loadItems();
}

document.getElementById("itemForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const id = document.getElementById("itemId").value;
  const payload = {
    name: document.getElementById("name").value,
    cost_price: parseFloat(document.getElementById("cost_price").value),
    sale_price: parseFloat(document.getElementById("sale_price").value),
    current_stock: parseInt(document.getElementById("current_stock").value || 0),
    reorder_threshold: parseInt(document.getElementById("reorder_threshold").value || 10),
    supplier_email: document.getElementById("supplier_email").value,
  };

  if (id) {
    await fetch(`${API}/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
  } else {
    await fetch(API, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
  }

  document.getElementById("itemForm").reset();
  document.getElementById("itemId").value = "";
  document.getElementById("submitBtn").textContent = "Add Item";
  loadItems();
});

async function openLowStockModal() {
  const res = await fetch("/api/email/low-stock-items");
  const items = await res.json();
  const list = document.getElementById("lowStockList");

  if (items.length === 0) {
    list.innerHTML = "<p>No items currently low on stock.</p>";
  } else {
    list.innerHTML = items.map(i => `
      <label style="display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--color-border);">
        <input type="checkbox" class="low-stock-check" value="${i.id}" checked style="width:auto; margin:0;">
        <span style="flex:1;">${i.name} — stock ${i.current_stock} (threshold ${i.reorder_threshold})</span>
        <span style="color:${i.supplier_email ? 'var(--color-text-muted)' : 'var(--color-danger)'}; font-size:12px;">
          ${i.supplier_email ? i.supplier_email : 'no supplier email'}
        </span>
      </label>`).join("");
  }

  document.getElementById("lowStockModal").style.display = "flex";
}

function closeLowStockModal() {
  document.getElementById("lowStockModal").style.display = "none";
}

async function confirmSendAlerts() {
  const checked = Array.from(document.querySelectorAll(".low-stock-check:checked")).map(c => parseInt(c.value));

  if (checked.length === 0) {
    await sfAlert("Select at least one item.");
    return;
  }

  const res = await fetch("/api/email/low-stock-alert", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ item_ids: checked }),
  });
  const data = await res.json();

  let msg = "";
  if (data.sent && data.sent.length) msg += "Sent: " + data.sent.join(", ") + "\n";
  if (data.skipped && data.skipped.length) msg += "Skipped: " + data.skipped.join(", ");
  if (data.message) msg = data.message;

  closeLowStockModal();
  await sfAlert(msg || "Done");
}

loadItems();
</script>

</body>
</html>

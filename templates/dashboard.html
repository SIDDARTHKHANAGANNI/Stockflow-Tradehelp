<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StockFlow - Dashboard</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

{% include "_nav.html" %}

<div class="page">
  <div class="eyebrow">Siddarth Traders</div>
  <h1>Dashboard</h1>
  <div style="margin-bottom: 24px;"></div>

  <div class="cards">
    <div class="stat-card"><div class="label">Total Revenue</div><div class="value" id="totalRevenue">-</div></div>
    <div class="stat-card"><div class="label">Total Profit</div><div class="value" id="totalProfit">-</div></div>
    <div class="stat-card"><div class="label">Stock Sold</div><div class="value" id="totalStock">-</div></div>
    <div class="stat-card"><div class="label">Transactions</div><div class="value" id="totalTxns">-</div></div>
  </div>

  <div class="charts">
    <div class="chart-box"><canvas id="monthlyChart"></canvas></div>
    <div class="chart-box"><canvas id="itemChart"></canvas></div>
  </div>

  <h2>Revenue &amp; Profit by Customer</h2>
  <table>
    <thead><tr><th>Customer</th><th>Qty Sold</th><th>Revenue</th><th>Profit</th></tr></thead>
    <tbody id="customerTable"></tbody>
  </table>
</div>

<script>
async function loadDashboard() {
  const summary = await fetch("/api/analytics/summary").then(r => r.json());
  document.getElementById("totalRevenue").textContent = "₹" + summary.total_revenue;
  document.getElementById("totalProfit").textContent = "₹" + summary.total_profit;
  document.getElementById("totalStock").textContent = summary.total_stock_sold;
  document.getElementById("totalTxns").textContent = summary.total_transactions;

  const byCustomer = await fetch("/api/analytics/by-customer").then(r => r.json());
  const custBody = document.getElementById("customerTable");
  custBody.innerHTML = "";
  byCustomer.forEach(c => {
    custBody.innerHTML += `
      <tr>
        <td>${c.customer}</td>
        <td>${c.total_qty}</td>
        <td>₹${c.revenue}</td>
        <td class="profit">₹${c.profit}</td>
      </tr>`;
  });

  const monthly = await fetch("/api/analytics/monthly").then(r => r.json());
  new Chart(document.getElementById("monthlyChart"), {
    type: "line",
    data: {
      labels: monthly.map(m => m.month),
      datasets: [{ label: "Revenue by Month", data: monthly.map(m => m.revenue), borderColor: "#16302A", backgroundColor: "#B8935B", tension: 0.3 }],
    },
    options: { responsive: true, plugins: { title: { display: true, text: "Monthly Revenue" } } },
  });

  const byItem = await fetch("/api/analytics/by-item").then(r => r.json());
  new Chart(document.getElementById("itemChart"), {
    type: "bar",
    data: {
      labels: byItem.map(i => i.item),
      datasets: [{ label: "Qty Sold", data: byItem.map(i => i.total_qty), backgroundColor: "#B8935B" }],
    },
    options: { responsive: true, plugins: { title: { display: true, text: "Top Selling Items" } } },
  });
}

loadDashboard();
</script>

</body>
</html>
